{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<h1 class="text-2xl font-bold mb-6">Login</h1>

<form method="post" class="space-y-4 bg-white shadow-md rounded-lg p-6 max-w-md mx-auto">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
        Login
    </button>
</form>
{% endblock %}
